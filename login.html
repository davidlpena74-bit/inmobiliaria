<!DOCTYPE html>
<html lang="es">
<head>

    <title>Acceso | Weperty CRM</title>
    <!-- Supabase JS Library -->

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --glass: rgba(255, 255, 255, 0.85);
            --text-dark: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .logo-box {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        h2 { font-size: 28px; color: var(--text-dark); margin-bottom: 8px; font-weight: 700; }
        p.subtitle { color: #64748b; font-size: 15px; margin-bottom: 35px; }

        .input-group { margin-bottom: 20px; position: relative; text-align: left; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 18px; }
        
        input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            outline: none;
            transition: all 0.3s;
            font-size: 15px;
            background: white;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

        .error-msg {
            color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 15px; display: none;
        }

        .footer-links { margin-top: 25px; font-size: 14px; color: #64748b; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* Floating decoration objects */
        .circle { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.1); z-index: 1; }
        .c1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .c2 { width: 300px; height: 300px; bottom: -50px; right: -50px; }
    </style>
</head>
<body>
