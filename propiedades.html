<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Real | Weperty OS</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Ajustes específicos para el modo tabla en Weperty OS */
        .table-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
        }

        th {
            background: hsla(0, 0%, 100%, 0.05);
            padding: 20px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 14px;
        }

        tr:hover {
            background: hsla(0, 0%, 100%, 0.02);
        }

        .img-preview {
            width: 60px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
        }

        .price-tag {
            font-weight: 800;
            color: var(--primary);
            font-size: 16px;
        }

        .zona-tag {
            background: var(--glass);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
        }

        .btn-view {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn-view:hover {
            background: var(--primary);
            color: var(--bg-main);
            border-color: var(--primary);
        }

        /* Buscador OS style */
        .search-bar-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .search-input-os {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            WEPERTY OS
        </div>
        <ul class="nav-links">
            <li class="nav-item" onclick="location.href='index.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Dashboard
            </li>
            <li class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"></path><path d="M3 7v1a3 3 0 0 0 6 0V7"></path><path d="M9 7v1a3 3 0 0 0 6 0V7"></path><path d="M15 7v1a3 3 0 0 0 6 0V7"></path><path d="M19 21V11"></path><path d="M5 21V11"></path></svg>
                Propiedades (Real)
            </li>
        </ul>
    </nav>

    <main>
        <header>
            <div>
                <h1>Inventario Maestro</h1>
                <p style="color: var(--text-dim);">Listado sincronizado desde Supabase para Weperty Properties.</p>
            </div>
            <div class="status-bar" style="background: var(--glass); padding: 10px 20px; border-radius: 12px; border: 1px solid var(--glass-border);">
                <span id="total-count" style="font-weight: 800; color: var(--primary);">0</span> INMUEBLES
            </div>
        </header>

        <div class="search-bar-container">
            <input type="text" class="search-input-os" placeholder="Buscar por calle, zona o distrito..." id="searchInput">
        </div>

        <div class="table-container">
            <table id="properties-table">
                <thead>
                    <tr>
                        <th>Vista</th>
                        <th>Precio</th>
                        <th>Tipo</th>
                        <th>Localización</th>
                        <th>Superficie</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Los datos de Supabase se inyectan aquí -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const SB_URL = "https://dwbvegnxmyvpolvofkfn.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3YnZlZ254bXl2cG9sdm9ma2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1Mzg1NTUsImV4cCI6MjA4MzExNDU1NX0.eT5ZSce8H8Yk8pWKyLUYChU0HtmZljywP4eEQd5FkOI";
        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        async function loadData() {
            const { data, error } = await _supabase
                .from('inm_propiedades')
                .select('*')
                .order('fecha_captura', { ascending: false });

            if (data) {
                renderTable(data);
                document.getElementById('total-count').innerText = data.length;
            }
        }

        function renderTable(propiedades) {
            const body = document.getElementById('table-body');
            body.innerHTML = propiedades.map(p => {
                const foto = p.caracteristicas?.fotos?.[0] || 'https://placehold.co/60x45?text=No+Foto';
                return `
                    <tr>
                        <td><img src="${foto}" class="img-preview"></td>
                        <td class="price-tag">${p.precio.toLocaleString()}€</td>
                        <td style="font-weight: 600;">${p.titulo.substring(0, 25)}...</td>
                        <td><span class="zona-tag">${p.zona}</span></td>
                        <td style="color: var(--text-dim);">${p.superficie} m²</td>
                        <td><a href="${p.url}" target="_blank" class="btn-view">VER ↗</a></td>
                    </tr>
                `;
            }).join('');
        }

        loadData();
    </script>
</body>
</html>
