<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weperty | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 20px; font-family: 'Outfit', sans-serif; background: #ffffff; 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center; color: #0f172a; box-sizing: border-box;
        }
        .logo { font-size: 48px; font-weight: 700; color: #2563eb; margin-bottom: 24px; letter-spacing: -1.5px; animation: fadeIn 1s ease-out; }
        .logo span { color: #0f172a; }
        .tag { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 4px; color: #64748b; margin-bottom: 8px; animation: fadeIn 1.2s ease-out; }
        h1 { font-size: 38px; margin: 0; font-weight: 700; letter-spacing: -0.5px; animation: fadeIn 1.4s ease-out; line-height: 1.2; }
        p { color: #64748b; font-size: 18px; max-width: 480px; line-height: 1.6; margin-top: 15px; animation: fadeIn 1.6s ease-out; }
        .cta-box { margin-top: 50px; animation: fadeIn 2s ease-out; }
        .admin-link { text-decoration: none; color: #94a3b8; font-size: 12px; font-weight: 500; padding: 12px 24px; border-radius: 50px; border: 1px solid #e2e8f0; transition: all 0.3s; display: inline-block; }
        .admin-link:hover { background: #f8fafc; color: #2563eb; border-color: #2563eb; transform: translateY(-2px); }
        
        /* Mobile Improvements */
        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            p { font-size: 16px; }
            .logo-img { height: 60px !important; }
            .tag { font-size: 9px; letter-spacing: 3px; }
        }

        .version-footer { position: fixed; bottom: 20px; font-size: 10px; color: #cbd5e1; font-weight: 500; letter-spacing: 1px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dot { color: #2563eb; font-weight: 700; }
    </style>
</head>
<body>
    <div class="tag">Next Generation Real Estate</div>
    <img src="logos_corporativos/weperty_logo.png" alt="Weperty Logo" class="logo-img" style="height: 75px; margin-bottom: 24px;">
    <h1>Coming soon</h1>
    <p>We are building a new digital experience for property management and real estate investments.</p>
    <div class="cta-box">
        <a href="crm/login.html" class="admin-link">Administrator access</a>
    </div>
    <div class="version-footer">VERSION 1.1.0</div>
</body>
</html>
