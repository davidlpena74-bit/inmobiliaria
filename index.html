<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Inversión | Weperty CRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sidebar.css">
    <style>
        :root {
            --inmoweb-blue: #3f51b5;
            --inmoweb-light: #f4f6f8;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto',sans-serif; }
        body { background: var(--inmoweb-light); display:flex; min-height:100vh; color: #444; }
        .header-section { margin-bottom: 30px; }
        h1 { font-size: 24px; color: #333; font-weight: 500; }

        /* Tarjetas Blancas Inmoweb */
        .card { background: white; border-radius: 8px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; margin-bottom: 25px; }

        .dashboard-grid { display: grid; grid-template-columns: 250px 1fr 1fr; gap: 20px; }
        
        .stat-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e1e4e8; text-align: center; }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--inmoweb-blue); }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 5px; }

        #map { height: 450px; width: 100%; border-radius: 8px; border: 1px solid #e1e4e8; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; color: #777; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:hover { background: #f1f5f9; cursor: pointer; }

        .btn-blue { background: var(--inmoweb-blue); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">WEPERTY CRM</div>
        <a href="index.html" class="nav-item active">Dashboard Inversion</a>
        <a href="mis_propiedades.html" class="nav-item">Mis Propiedades</a>
        <a href="ficha_inmueble.html" class="nav-item">Ficha Inmueble</a>
        <a href="portales.html" class="nav-item">Pasarelas (API)</a>
    </nav>

    <main class="main-content">
        <div class="header-section">
            <h1>⚓ Alicante | Análisis Regional Costa Blanca</h1>
        </div>

        <div class="dashboard-grid">
            <!-- Ranking -->
            <div class="card">
                <h2 style="font-size: 14px; margin-bottom: 15px; text-transform: uppercase; color: #777;">🏆 Rentabilidad Top</h2>
                <div id="rankingList"></div>
            </div>

            <!-- Mapa -->
            <div class="card" style="grid-column: span 2;">
                <div id="map"></div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-size: 16px; margin-bottom: 15px;">📊 Comparativa de Poblaciones</h2>
            <table>
                <thead>
                    <tr>
                        <th>Población</th>
                        <th>Venta Media (€/m²)</th>
                        <th>Alquiler (€/m²)</th>
                        <th>Rentabilidad (%)</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        const poblaciones = [
            { nombre: "Alicante", precio: 2450, alquiler: 12.5, rentabilidad: 6.1, lat: 38.345, lon: -0.481 },
            { nombre: "Elche", precio: 1550, alquiler: 8.5, rentabilidad: 6.6, lat: 38.262, lon: -0.697 },
            { nombre: "Benidorm", precio: 3800, alquiler: 19.5, rentabilidad: 6.2, lat: 38.541, lon: -0.124 },
            { nombre: "Torrevieja", precio: 1850, alquiler: 10.5, rentabilidad: 6.8, lat: 37.978, lon: -0.683 },
            { nombre: "Altea", precio: 3300, alquiler: 16.5, rentabilidad: 6.0, lat: 38.598, lon: -0.051 }
        ];

        let map;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([38.450, -0.350], 10);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            poblaciones.forEach(p => {
                const marker = L.circleMarker([p.lat, p.lon], {
                    radius: 10, fillColor: '#3f51b5', color: "#fff", weight: 2, fillOpacity: 0.9
                }).addTo(map);
                marker.bindPopup(`<b>${p.nombre}</b><br>Rent: ${p.rentabilidad}%`);
            });
        }

        function renderData() {
            const table = document.getElementById('tableBody');
            table.innerHTML = poblaciones.map(p => `
                <tr>
                    <td><strong>${p.nombre}</strong></td>
                    <td>${p.precio}€</td>
                    <td>${p.alquiler}€</td>
                    <td><strong style="color:var(--success)">${p.rentabilidad}%</strong></td>
                    <td><span style="color:#27ae60">● Activo</span></td>
                </tr>
            `).join('');
            
            const ranking = document.getElementById('rankingList');
            ranking.innerHTML = poblaciones.sort((a,b) => b.rentabilidad - a.rentabilidad).map((p,i) => `
                <div style="padding:10px 0; border-bottom:1px solid #f0f0f0; font-size:13px;">
                    #${i+1} <b>${p.nombre}</b> <span style="float:right;">${p.rentabilidad}%</span>
                </div>
            `).join('');
        }

        window.onload = () => { initMap(); renderData(); };
    </script>
</body>
</html>
