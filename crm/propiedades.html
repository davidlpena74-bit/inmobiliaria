<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Propiedades - Madrid 2026</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #1dd1a1;
            --dark: #1e293b;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e5eaff 100%);
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
            /* Reducido para maximizar espacio */
        }

        .container {
            max-width: 100%;
            /* Uso de toda la pantalla */
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: white;
            color: var(--primary);
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.2);
            background: var(--primary);
            color: white;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .status-bar {
            background: var(--glass);
            padding: 15px 30px;
            border-radius: 20px;
            display: inline-flex;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #64748b;
        }

        .status-item span {
            color: var(--primary);
        }

        /* Buscador y Filtros */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 20px;
            border: none;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .filter-select {
            padding: 0 25px;
            border-radius: 20px;
            border: none;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
        }

        /* Tabla de Propiedades */
        .table-wrapper {
            background: white;
            border-radius: 12px;
            /* Un poco más cuadrado para modo tabla masiva */
            overflow-x: auto;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.03);
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: auto;
        }

        th {
            background: #f8fafc;
            padding: 12px 15px;
            font-weight: 700;
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #edf2f7;
            cursor: pointer;
            white-space: nowrap;
        }

        th:hover {
            background: #f1f5f9;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.85rem;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #fcfdfe;
        }

        .td-price {
            font-weight: 700;
            color: var(--dark);
            white-space: nowrap;
        }

        .td-old-price {
            text-decoration: line-through;
            color: #94a3b8;
            font-size: 0.75rem;
            display: block;
        }

        .discount-badge {
            background: #ff7675;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.7rem;
            margin-left: 5px;
        }

        .td-title {
            font-weight: 600;
            color: #475569;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .td-title a {
            text-decoration: none;
            color: inherit;
            transition: color 0.2s;
        }

        .td-title a:hover {
            color: var(--primary);
        }

        .td-zona {
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .portal-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            display: inline-block;
        }

        .badge-idealista {
            background: #fee2e2;
            color: #ef4444;
        }

        .badge-fotocasa {
            background: #e0e7ff;
            color: #6366f1;
        }

        .property-grid {
            display: none;
        }

        /* Ocultamos el grid anterior */

        /* Loading Animation */
        .loader {
            display: grid;
            place-items: center;
            height: 300px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 30px;
        }

        /* Estilos del Gestor de Fotos */
        .td-foto {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            background: #e2e8f0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .td-foto:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .td-foto img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-action {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-photos {
            background: #edf2f7;
            color: #4a5568;
        }

        .btn-photos:hover {
            background: #e2e8f0;
            color: var(--primary);
        }

        .btn-xml {
            background: #2d3436;
            color: white !important;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal-header {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #64748b;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1e293b;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .photo-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: #f8fafc;
            border-radius: 10px;
        }

        .preview-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #cbd5e0;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

    </style>
</head>

<body>

    <div class="container">
        <a href="index.html" class="back-btn">← Volver al Dashboard</a>
        <header>
            <h1>Oportunidades Inmobiliarias</h1>
            <div class="status-bar">
                <div class="status-item">📦 Total: <span id="total-count">0</span></div>
                <div class="status-item">📍 Distritos: <span id="distrito-count">0</span></div>
                <div class="status-item">📅 Hoy: <span id="sync-date">15/02/2026</span></div>
            </div>
            <div style="margin-top: 20px;">
                <button onclick="downloadIdealistaXML()" class="btn-xml">
                    📄 Descargar XML para Idealista
                </button>
            </div>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por calle o distrito..."
                    onkeyup="filterItems()">
            </div>
            <select class="filter-select" id="priceFilter" onchange="filterItems()">
                <option value="0">Cualquier precio</option>
                <option value="200000">
                    < hasta 200k€</option>
                <option value="400000">
                    < hasta 400k€</option>
                <option value="600000">
                    < hasta 600k€</option>
            </select>
        </div>

        <div class="table-wrapper" id="content-area">
            <div class="loader">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Modal de Gestión de Fotos -->
    <div id="photoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Gestionar Fotos</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="form-group">
                <label>Referencia / Carpeta en GitHub (fotos-inmobiliaria)</label>
                <input type="text" id="refInput" placeholder="Ej: REF-001" oninput="updatePreviews()">
            </div>
            <div class="form-group">
                <label>Archivos de imagen (separados por coma)</label>
                <input type="text" id="filesInput" placeholder="Ej: portada.jpg, cocina.jpg, salon.jpg" oninput="updatePreviews()">
                <small style="color: #64748b; font-size: 0.75rem;">Se generarán automáticamente las URLs Raw de GitHub.</small>
            </div>
            
            <div id="previews" class="photo-preview-grid">
                <!-- Previsualización -->
            </div>

            <div style="margin-top: 20px;">
                <button class="btn-save" onclick="savePhotos()">Guardar y Sincronizar</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://dwbvegnxmyvpolvofkfn.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3YnZlZ254bXl2cG9sdm9ma2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1Mzg1NTUsImV4cCI6MjA4MzExNDU1NX0.eT5ZSce8H8Yk8pWKyLUYChU0HtmZljywP4eEQd5FkOI";
        const GITHUB_USER = "davidlpena74-bit";
        const GITHUB_REPO = "fotos-inmobiliaria";
        
        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        let allProperties = [];
        let currentEditingId = null;

        async function loadProperties() {
            const area = document.getElementById('content-area');
            try {
                const { data, error } = await _supabase
                    .from('inm_propiedades')
                    .select('*')
                    .order('fecha_captura', { ascending: false });

                if (error) throw error;

                allProperties = data;
                updateStats(data);
                renderTable(data);
            } catch (e) {
                console.error(e);
                area.innerHTML = `<div class="empty-state">❌ Error cargando propiedades.</div>`;
            }
        }

        function getGitHubUrl(ref, file) {
            if (!ref || !file) return null;
            return `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${ref}/${file.trim()}`;
        }

        function renderTable(data) {
            const area = document.getElementById('content-area');
            if (data.length === 0) {
                area.innerHTML = `<div class="empty-state">No se han encontrado propiedades.</div>`;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Precio Actual</th>
                            <th>DTO.</th>
                            <th>Tipo</th>
                            <th>Zona</th>
                            <th>m²</th>
                            <th class="hide-mobile">Ref.</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            html += data.map(prop => {
                // Extraer fotos y referencia de caracteristicas
                const fotos = prop.caracteristicas?.fotos || [];
                const referencia = prop.caracteristicas?.referencia || "SIN REF";
                const fotoPrincipal = fotos.length > 0 ? fotos[0] : null;

                // Cálculo de Descuento
                let descuento = "";
                if (prop.precio_anterior && prop.precio_anterior > prop.precio) {
                    const pct = Math.round(((prop.precio_anterior - prop.precio) / prop.precio_anterior) * 100);
                    descuento = `<span class="discount-badge">-${pct}%</span>`;
                }

                return `
                    <tr id="row-${prop.id}">
                        <td>
                            <div class="td-foto" onclick="openPhotoManager(${prop.id})">
                                ${fotoPrincipal ? `<img src="${fotoPrincipal}" onerror="this.src='https://placehold.co/80x60?text=Error'">` : '<span style="font-size: 10px; color: #94a3b8;">SIN FOTO</span>'}
                            </div>
                        </td>
                        <td class="td-price">
                            ${prop.precio.toLocaleString()}€
                            <div class="td-old-price">${prop.precio_anterior ? prop.precio_anterior.toLocaleString() + '€' : ''}</div>
                        </td>
                        <td>${descuento}</td>
                        <td><a href="${prop.url}" target="_blank" style="text-decoration: none; color: inherit; font-weight:600;">${prop.titulo.substring(0, 30)}...</a></td>
                        <td class="td-zona">${prop.zona}</td>
                        <td>${prop.superficie} m²</td>
                        <td class="hide-mobile"><span style="font-family: monospace; font-weight:700;">${referencia}</span></td>
                        <td>
                            <div style="display: flex; gap: 5px;">
                                <button class="btn-action btn-photos" onclick="openPhotoManager(${prop.id})">Fotos</button>
                                <a href="${prop.url}" target="_blank" style="text-decoration: none;" class="btn-action btn-photos">Ver ↗</a>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            html += `</tbody></table>`;
            area.innerHTML = html;
        }

        // --- Funciones del Gestor de Fotos ---

        function openPhotoManager(id) {
            currentEditingId = id;
            const prop = allProperties.find(p => p.id === id);
            if (!prop) return;

            document.getElementById('modalTitle').innerText = `Gestión: ${prop.zona}`;
            document.getElementById('refInput').value = prop.caracteristicas?.referencia || "";
            
            // Los archivos de fotos los guardábamos como URLs completas, intentamos extraer solo el nombre del archivo
            const currentPhotos = prop.caracteristicas?.fotos || [];
            const fileNames = currentPhotos.map(url => {
                const parts = url.split('/');
                return parts[parts.length - 1];
            }).join(', ');
            
            document.getElementById('filesInput').value = fileNames;
            updatePreviews();
            
            document.getElementById('photoModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('photoModal').classList.remove('active');
            currentEditingId = null;
        }

        function updatePreviews() {
            const ref = document.getElementById('refInput').value;
            const filesStr = document.getElementById('filesInput').value;
            const container = document.getElementById('previews');
            container.innerHTML = "";

            if (!ref || !filesStr) return;

            const files = filesStr.split(',').filter(f => f.trim() !== "");
            files.forEach(f => {
                const url = getGitHubUrl(ref, f);
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `<img src="${url}" onerror="this.parentElement.style.background='#ff7675'">`;
                container.appendChild(div);
            });
        }

        async function savePhotos() {
            if (!currentEditingId) return;
            const ref = document.getElementById('refInput').value;
            const filesStr = document.getElementById('filesInput').value;
            
            const btn = document.querySelector('.btn-save');
            const originalText = btn.innerText;
            btn.innerText = "💾 Guardando...";
            btn.disabled = true;

            const files = filesStr.split(',').map(f => f.trim()).filter(f => f !== "");
            const urls = files.map(f => getGitHubUrl(ref, f));

            const prop = allProperties.find(p => p.id === currentEditingId);
            const nuevasCaracteristicas = {
                ...(prop.caracteristicas || {}),
                referencia: ref,
                fotos: urls
            };

            try {
                const { error } = await _supabase
                    .from('inm_propiedades')
                    .update({ caracteristicas: nuevasCaracteristicas })
                    .eq('id', currentEditingId);

                if (error) throw error;
                
                alert("✅ Fotos vinculadas correctamente.");
                closeModal();
                loadProperties(); // Recargar tabla
            } catch (e) {
                alert("❌ Error al guardar: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // --- Generación de XML para Idealista ---

        function downloadIdealistaXML() {
            const readyProps = allProperties.filter(p => p.caracteristicas?.fotos?.length > 0);
            
            if (readyProps.length === 0) {
                alert("⚠️ No hay propiedades con fotos configuradas para exportar.");
                return;
            }

            let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<properties>\n`;
            
            readyProps.forEach(p => {
                xml += `  <property>\n`;
                xml += `    <propertyCode>${p.caracteristicas?.referencia || p.id}</propertyCode>\n`;
                xml += `    <propertyOperation>sale</propertyOperation>\n`;
                xml += `    <propertyType>flat</propertyType>\n`;
                xml += `    <address>\n`;
                xml += `      <country>ES</country>\n`;
                xml += `      <province>Madrid</province>\n`;
                xml += `      <municipality>${p.zona}</municipality>\n`;
                xml += `      <streetName>${p.caracteristicas?.calle || p.zona}</streetName>\n`;
                xml += `    </address>\n`;
                xml += `    <features>\n`;
                xml += `      <constructedArea>${p.superficie}</constructedArea>\n`;
                xml += `      <rooms>${p.habitaciones}</rooms>\n`;
                xml += `      <bathrooms>${p.banos || 1}</bathrooms>\n`;
                xml += `    </features>\n`;
                xml += `    <price>${p.precio}</price>\n`;
                xml += `    <images>\n`;
                
                p.caracteristicas.fotos.forEach((url, index) => {
                    xml += `      <image>\n`;
                    xml += `        <url>${url}</url>\n`;
                    xml += `        <order>${index + 1}</order>\n`;
                    xml += `        <label>${index === 0 ? 'principal' : ''}</label>\n`;
                    xml += `      </image>\n`;
                });
                
                xml += `    </images>\n`;
                xml += `  </property>\n`;
            });
            
            xml += `</properties>`;

            const blob = new Blob([xml], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `feed_idealista_${new Date().toISOString().split('T')[0]}.xml`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function updateStats(data) {
            document.getElementById('total-count').innerText = data.length;
            const distritos = [...new Set(data.map(i => i.zona))];
            document.getElementById('distrito-count').innerText = distritos.length;
        }

        function filterItems() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const maxPrice = parseInt(document.getElementById('priceFilter').value);

            const filtered = allProperties.filter(p => {
                const matchSearch = p.titulo.toLowerCase().includes(searchTerm) || p.zona.toLowerCase().includes(searchTerm);
                const matchPrice = maxPrice === 0 || p.precio <= maxPrice;
                return matchSearch && matchPrice;
            });

            renderTable(filtered);
        }

        window.onload = loadProperties;

    </script>
</body>

</html>
